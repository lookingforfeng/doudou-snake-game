<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇 - 豆豆版 🫛</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        h1 { margin-bottom: 10px; }
        canvas {
            border: 3px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        #score { font-size: 24px; margin: 10px 0; }
        #instructions { color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇 - 豆豆版</h1>
    <div id="score">得分: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <p id="instructions">用方向键控制，空格暂停</p>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        const grid = 20;
        const tileCount = canvas.width / grid;
        
        let snake = [{x:10,y:10}];
        let food = {x:15,y:15};
        let dx = 0, dy = 0;
        let score = 0;
        let gameOver = false;
        
        function gameLoop() {
            if(gameOver) return;
            
            // 移动蛇
            const head = {x:snake[0].x+dx, y:snake[0].y+dy};
            
            // 撞墙
            if(head.x<0||head.x>=tileCount||head.y<0||head.y>=tileCount) {
                gameOver = true;
                alert('游戏结束！得分: ' + score);
                return;
            }
            
            // 撞自己
            for(let s of snake) {
                if(head.x===s.x && head.y===s.y) {
                    gameOver = true;
                    alert('游戏结束！得分: ' + score);
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if(head.x===food.x && head.y===food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                food = {
                    x:Math.floor(Math.random()*tileCount),
                    y:Math.floor(Math.random()*tileCount)
                };
            } else {
                snake.pop();
            }
            
            // 画图
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            
            // 画蛇
            ctx.fillStyle = '#00ff88';
            for(let i=0;i<snake.length;i++) {
                ctx.fillRect(snake[i].x*grid, snake[i].y*grid, grid-2, grid-2);
            }
            
            // 画食物
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);
            
            setTimeout(gameLoop, 100);
        }
        
        document.addEventListener('keydown', e => {
            if(e.key==='ArrowUp' && dy!==1) { dx=0; dy=-1; }
            if(e.key==='ArrowDown' && dy!==-1) { dx=0; dy=1; }
            if(e.key==='ArrowLeft' && dx!==1) { dx=-1; dy=0; }
            if(e.key==='ArrowRight' && dx!==-1) { dx=1; dy=0; }
            if(e.key===' ') { gameOver = !gameOver; if(!gameOver) gameLoop(); }
        });
        
        gameLoop();
    </script>
</body>
</html>
